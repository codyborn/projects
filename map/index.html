<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, orientation=portrait">
  <title>Citizen Earth</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🌎</text></svg>">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <!-- Night Mode Toggle Button -->
  <button class="night-mode-toggle" onclick="toggleNightMode()"></button>

  <!-- Latest Blog Post Button -->
  <button class="latest-blog-toggle" onclick="openLatestBlog()" title="Latest blog post" aria-label="Latest blog post">
    <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <rect x="4" y="3" width="16" height="18" rx="2"></rect>
      <line x1="8" y1="8" x2="16" y2="8"></line>
      <line x1="8" y1="12" x2="16" y2="12"></line>
      <line x1="8" y1="16" x2="13" y2="16"></line>
    </svg>
  </button>
  
  <canvas id="water-canvas"></canvas>
  <canvas id="cloud-canvas"></canvas>
  <canvas id="boat-canvas"></canvas>
  <canvas id="bottle-canvas"></canvas>
  <h1>Citizen Earth</h1>
  <div id="sunk-ships-counter">Ships Sunk: 0</div>
  <div class="island-grid" style="position:relative; z-index:2;">
    <!-- Islands will be inserted here by JS -->
  </div>
  <svg id="island-lines" style="position:absolute; top:0; left:0; pointer-events:none; z-index:1;"></svg>
  
  <!-- Blog Reader Overlay -->
  <div class="blog-overlay" id="blog-overlay">
    <div class="blog-content">
      <div class="blog-header">
        <h2 class="blog-title" id="blog-title"></h2>
        <div style="display: flex; gap: 10px;">
          <button class="share-button" id="share-button" onclick="copyBlogLink()">Share</button>
          <button class="return-button" onclick="closeBlogOverlay()">Close</button>
        </div>
      </div>
      <div class="blog-hero" id="blog-hero"></div>
      <div class="blog-text" id="blog-text"></div>
      <div class="blog-footer" id="blog-footer">
        <button class="nav-button" id="prev-button" onclick="navigateBlog(-1)"></button>
        <button class="nav-button" id="next-button" onclick="navigateBlog(1)"></button>
      </div>
    </div>
  </div>
  
  <footer style="position: fixed; bottom: 2px; width: 100%; text-align: center; opacity: 0.2; font-size: 0.8rem; color: #222;">
    Version 1.0.13
  </footer>

  <!-- JavaScript files -->
  <script src="js/data.js"></script>
  <script src="js/water.js"></script>
  <script src="js/clouds.js"></script>
  <script src="js/boats.js"></script>
  <script src="js/bottles.js"></script>
  <script src="js/islands.js"></script>
  <script src="js/blog-reader.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
